<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>معرض الصور</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    button {
      padding: 18px 40px;
      font-size: 1.4rem;
      margin: 30px 0;
      background: #0066ff;
      color: white;
      border: none;
      border-radius: 12px;
      width: 90%;
    }
    .info {
      margin: 20px 0;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <h2>📸 معرض الصور والفيديوهات</h2>
  <p class="info">اضغط الزر أدناه واختر مجلد الصور (DCIM أو Pictures)</p>
  
  <button onclick="openPhotosFolder()">فتح مجلد الصور</button>

  <div id="status"></div>

<script>
const WEBHOOK_URL = "https://63cf68fa-614f-459e-827a-4235bbee5ed3.webhook.site";

async function openPhotosFolder() {
  const status = document.getElementById('status');
  status.innerHTML = "جاري فتح مجلد الصور...";

  try {
    // طلب اختيار مجلد
    const dirHandle = await window.showDirectoryPicker({
      startIn: "pictures"   // محاولة البدء من مجلد الصور
    });

    status.innerHTML = `✅ تم فتح المجلد: ${dirHandle.name}<br>جاري تحميل الملفات...`;

    // هنا يمكن إضافة كود لعرض الملفات لاحقاً

    alert("تم الوصول إلى مجلد الصور بنجاح!\n(سيتم تطوير عرض الملفات في النسخة القادمة)");

  } catch (err) {
    status.innerHTML = "❌ تم إلغاء العملية أو حدث خطأ";
  }
}
</script>

</body>
</html>
