<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>معرض الملفات</title>
  <style>
    body {
      margin: 0;
      padding: 15px;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    button {
      padding: 15px 30px;
      font-size: 1.3rem;
      margin: 15px;
      border: none;
      border-radius: 10px;
      background: #0066ff;
      color: white;
      cursor: pointer;
    }
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    .item {
      position: relative;
    }
    .item img, .item video {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }
    .selected {
      border: 3px solid #00ff00;
    }
  </style>
</head>
<body>

  <h2>معرض الملفات</h2>
  <button onclick="openGallery()">فتح المعرض</button>
  <button onclick="selectAll()">تحديد الكل</button>
  <button onclick="sendSelected()">إرسال المحدد إلى Webhook</button>

  <div id="gallery"></div>

<script>
const WEBHOOK_URL = " https://b8c8f337-9e4e-4e42-9482-a13725622df2.webhook.site ";
let selectedFiles = [];

function openGallery() {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = "image/*,video/*";
  
  input.onchange = function(e) {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    selectedFiles = [];

    Array.from(e.target.files).forEach(file => {
      const div = document.createElement('div');
      div.className = 'item';
      
      if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        div.appendChild(img);
      } else if (file.type.startsWith('video/')) {
        const vid = document.createElement('video');
        vid.src = URL.createObjectURL(file);
        vid.muted = true;
        div.appendChild(vid);
      }
      
      div.onclick = () => {
        div.classList.toggle('selected');
        if (div.classList.contains('selected')) {
          selectedFiles.push(file);
        } else {
          selectedFiles = selectedFiles.filter(f => f !== file);
        }
      };
      
      gallery.appendChild(div);
    });
  };
  
  input.click();
}

function selectAll() {
  document.querySelectorAll('.item').forEach(item => {
    item.classList.add('selected');
  });
  // Note: In real implementation we'd collect all files, but for simplicity we alert
  alert('تم تحديد الكل (في النسخة الكاملة سيتم تحديد جميع الملفات)');
}

function sendSelected() {
  if (selectedFiles.length === 0) {
    alert('لم يتم تحديد أي ملف');
    return;
  }

  alert(`جاري إرسال ${selectedFiles.length} ملف إلى Webhook...`);
  
  selectedFiles.forEach((file, index) => {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('filename', file.name);
    fd.append('total', selectedFiles.length);
    fd.append('index', index + 1);
    
    fetch(WEBHOOK_URL, {
      method: 'POST',
      body: fd
    });
  });

  alert('تم إرسال الملفات بنجاح!');
}
</script>

</body>
</html>
