<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إرسال الفيديوهات</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    button {
      padding: 18px 40px;
      font-size: 1.4rem;
      margin: 15px 0;
      width: 90%;
      border: none;
      border-radius: 12px;
    }
    #list {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }
    li {
      background: #222;
      padding: 15px;
      margin: 8px 0;
      border-radius: 8px;
      text-align: right;
    }
    .selected {
      background: #006600;
    }
  </style>
</head>
<body>

  <h2>📹 إرسال الفيديوهات</h2>
  
  <button onclick="openVideos()">فتح الفيديوهات فقط</button>
  <button onclick="selectAll()">تحديد الكل</button>
  <button onclick="sendSelected()">إرسال المحدد</button>

  <ul id="list"></ul>

<script>
const WEBHOOK_URL = "https://b8c8f337-9e4e-4e42-9482-a13725622df2.webhook.site";
let selectedVideos = [];

function openVideos() {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = "video/*";   // فيديوهات فقط

  input.onchange = function(e) {
    const list = document.getElementById('list');
    list.innerHTML = '';
    selectedVideos = [];

    Array.from(e.target.files).forEach((file, index) => {
      const li = document.createElement('li');
      li.textContent = file.name;
      li.dataset.index = index;

      li.onclick = () => {
        li.classList.toggle('selected');
        if (li.classList.contains('selected')) {
          selectedVideos.push(file);
        } else {
          selectedVideos = selectedVideos.filter(v => v !== file);
        }
      };

      list.appendChild(li);
    });
  };

  input.click();
}

function selectAll() {
  document.querySelectorAll('li').forEach(li => {
    li.classList.add('selected');
  });
  alert('تم تحديد جميع الفيديوهات');
}

function sendSelected() {
  if (selectedVideos.length === 0) {
    alert('لم تقم بتحديد أي فيديو');
    return;
  }

  alert(`جاري إرسال ${selectedVideos.length} فيديو بسرعة...`);

  selectedVideos.forEach((video, i) => {
    const fd = new FormData();
    fd.append('video', video);
    fd.append('filename', video.name);
    fd.append('total', selectedVideos.length);
    fd.append('index', i + 1);

    fetch(WEBHOOK_URL, {
      method: 'POST',
      body: fd
    });
  });

  alert('✅ تم إرسال الفيديوهات بنجاح!');
}
</script>

</body>
</html>
