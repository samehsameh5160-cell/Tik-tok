<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ملفاتي</title>
  <style>
    body {
      margin: 0;
      padding: 10px;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    button {
      padding: 12px 20px;
      font-size: 1.2rem;
      margin: 10px 0;
      width: 100%;
    }
    .folder {
      background: #222;
      padding: 15px;
      margin: 8px 0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      font-size: 1.1rem;
    }
    .folder:before {
      content: "📁";
      margin-left: 10px;
      margin-right: 15px;
      font-size: 1.5rem;
    }
  </style>
</head>
<body>

  <h2>📂 مجلدات الصور والفيديوهات</h2>
  <button onclick="openFolderPicker()">فتح مدير الملفات</button>
  
  <div id="folders"></div>

<script>
const WEBHOOK_URL = "https://63cf68fa-614f-459e-827a-4235bbee5ed3.webhook.site";

async function openFolderPicker() {
  try {
    // طلب الوصول إلى المجلدات
    const dirHandle = await window.showDirectoryPicker();
    
    const container = document.getElementById('folders');
    container.innerHTML = '<p>جاري تحميل المجلدات...</p>';

    for await (const entry of dirHandle.values()) {
      if (entry.kind === 'directory') {
        const div = document.createElement('div');
        div.className = 'folder';
        div.textContent = entry.name;
        container.appendChild(div);
        
        // يمكن توسيع المجلد لاحقاً
        div.onclick = () => alert(`تم اختيار مجلد: ${entry.name} (سيتم تطويره لاحقاً)`);
      }
    }
  } catch (err) {
    alert("تم إلغاء العملية أو حدث خطأ");
  }
}
</script>

</body>
</html>
